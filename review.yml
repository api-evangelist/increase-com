aid: increase-com
name: Increase
review:
  question: Does Increase expose a documented public WebSocket API?
  answer: false
  date: '2026-07-02'
  reviewer: API Evangelist
  asyncapiSpecCreated: false
  asyncapiScopeNote: |
    No AsyncAPI document was authored. Increase's own public surface is
    request/response REST over HTTPS (base https://api.increase.com), and its
    push mechanism is HTTP webhooks, not a WebSocket or SSE stream. State
    changes are emitted as Events and delivered to a customer-hosted HTTPS
    endpoint via Event Subscriptions using the Standard Webhooks specification
    (HMAC-SHA256 signatures). Because the transport is server-to-endpoint HTTP
    POST (with a client-pollable List Events fallback), there is no server-push
    socket transport on Increase's own API to model, and under current scope an
    outbound-webhook catalog is documented in review.yml rather than as an
    AsyncAPI channel document.
findings:
  summary: |
    Increase does not publish a documented public WebSocket API. Increase is a
    bank-grade payments and financial infrastructure platform whose entire
    public API is REST over HTTPS at https://api.increase.com (sandbox at
    https://sandbox.increase.com), authenticated with a Bearer API key (OAuth
    is also supported for platform integrations). Every state change across
    Accounts, transfers, Cards, Entities, and other resources produces an
    Event. Events are delivered two ways, neither of which is a WebSocket:
    (1) push - Event Subscriptions POST signed webhooks to a customer HTTPS
    endpoint, and (2) pull - the List Events API returns up to 30 days of
    history with cursor pagination. No realtime, bidirectional, or streaming
    WebSocket (ws:// or wss://) endpoint is documented anywhere in Increase's
    API reference, webhooks guide, or SDKs as of the review date. Card
    authorization approve/decline is handled synchronously via Real-Time
    Decisions (an Event + REST action), still not a socket.
  webhookMechanism: |
    Webhooks follow the Standard Webhooks specification. Each delivery carries
    three headers: `webhook-id` (the Event ID, usable as an idempotency key),
    `webhook-timestamp` (Unix seconds, to bound replay), and `webhook-signature`
    (a `v1,`-prefixed Base64 HMAC-SHA256 of `id.timestamp.body` computed with
    the subscription's shared secret). Consumers should verify the signature with
    a constant-time comparison and check the timestamp window (~5 min). Increase
    expects a 2xx response within 10 seconds; non-2xx, timeouts, and connection
    errors all trigger retries, up to 8 attempts over roughly 72 hours, after
    which the Event will not arrive via webhook and must be recovered through the
    List Events API (30-day retention). Event Subscriptions are
    environment-specific (sandbox vs production) and can be filtered to a single
    event category.
  transports:
    - protocol: REST
      scheme: https
      baseURL: https://api.increase.com
      documented: true
      note: Full request/response REST API. Sandbox base is https://sandbox.increase.com.
    - protocol: Webhook
      scheme: https
      documented: true
      note: Event Subscriptions POST signed (Standard Webhooks HMAC-SHA256) Events to a customer HTTPS endpoint. Server-to-endpoint HTTP, not WebSocket.
    - protocol: HTTP Poll
      scheme: https
      documented: true
      note: List Events API (GET /events) returns up to 30 days of Events with cursor pagination for backfill / missed-webhook recovery.
    - protocol: WebSocket
      scheme: wss
      documented: false
      note: No WebSocket endpoint is documented in Increase's API reference, webhooks guide, or SDKs as of the review date.
    - protocol: SSE
      scheme: https
      documented: false
      note: No Server-Sent Events streaming surface is documented; push is via HTTP webhooks only.
