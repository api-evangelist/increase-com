  endpointsModeled:
    - note: >-
        The OpenAPI at openapi/increase-com-openapi.yml models a representative,
        non-exhaustive subset of Increase's large REST surface. The full API also
        includes FedNow / Swift / Card Push transfers, Card Tokens / Card
        Validations, Inbound Wire/Check/FedNow variants, Physical Cards, Entity
        Beneficial Owners and Onboarding Sessions, Programs, Account Statements,
        Files / File Links / Exports, Groups, OAuth Applications/Connections/Tokens,
        Intrafi enrollments/balances/exclusions, and a broad Simulations namespace,
        all confirmed in the public OpenAPI spec and Stainless SDKs but not each
        enumerated in this document.
  openSource: |
    Increase's API is closed (it is a regulated banking platform), but it
    publishes a public OpenAPI 3.1 specification at
    https://api.increase.com/openapi.json and maintains open-source,
    Stainless-generated client SDKs on GitHub (github.com/Increase) for Python,
    TypeScript, Java, Kotlin, Go, Ruby, PHP, and C#, plus a CLI. This review's
    endpoint list was grounded in those SDKs' api.md manifests and the public
    API reference.
sources:
  - url: https://increase.com/documentation/api/overview
    type: APIReference
    note: REST base URLs (api.increase.com / sandbox.increase.com), Bearer auth, idempotency. No WebSocket.
  - url: https://increase.com/documentation/webhooks
    type: Documentation
    note: HTTP webhooks via Standard Webhooks (HMAC-SHA256); 10s ack, 8 retries over ~72h; List Events fallback (30d). Explicitly no WebSocket/SSE.
  - url: https://increase.com/documentation/idempotency-keys
    type: Documentation
    note: Idempotency-Key header makes retries safe against duplicate money movement.
  - url: https://api.increase.com/openapi.json
    type: OpenAPI
    note: Public OpenAPI 3.1 specification for the Increase API.
  - url: https://github.com/Increase
    type: SourceCode
    note: Stainless-generated SDKs (Python, TypeScript, Java, Kotlin, Go, Ruby, PHP, C#) whose api.md files enumerate every endpoint.
actions:
  asyncapiPath: null
  apisYmlUpdated: true
  reason: |
    No WebSocket protocol surface exists. Increase's own public API is
    request/response REST, and its event delivery is HTTP webhooks (Standard
    Webhooks HMAC-SHA256) with a List Events polling fallback - server-to-endpoint
    HTTP, not a bidirectional socket. No AsyncAPI document was created because
    there is no WebSocket or SSE server-push transport on Increase's own API to
    model; the webhook mechanism, headers, signing, and retry policy are
    documented in this review instead.
