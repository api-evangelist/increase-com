aid: increase-com
url: https://raw.githubusercontent.com/api-evangelist/increase-com/refs/heads/main/apis.yml
name: Increase
kind: company
description: Increase is a bank-grade payments and financial infrastructure platform
  that exposes a single REST API for moving and holding money in the United States -
  ACH transfers, real-time payments (RTP and FedNow), domestic and international wires,
  physical and mailed checks, deposit accounts and account numbers, card issuing and
  card acquiring, ledgering and bookkeeping, KYC/KYB entities, and lockboxes. Increase
  connects directly to the Federal Reserve and card networks through partner banks,
  and every state change is delivered as an Event over HTTP webhooks. The API is
  documented with a public OpenAPI 3.1 spec (https://api.increase.com/openapi.json)
  and Stainless-generated SDKs for Python, TypeScript, Java, Kotlin, Go, Ruby, PHP,
  and C#. Base URL https://api.increase.com with a sandbox at https://sandbox.increase.com.
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
tags:
- Payments
- Banking
- Financial Infrastructure
- ACH
- Wire Transfers
- Real-Time Payments
- Cards
- Fintech
created: '2026-07-02'
modified: '2026-07-02'
