description: >-
  FinOps view of Increase spend. Increase is a bank-grade payments platform billed
  on a contract, per-item basis: fees attach to the money movement itself - each
  ACH transfer, wire, real-time payment (RTP / FedNow), check, and card
  transaction - plus program, account, and related service fees negotiated at
  volume-based rates. There is no self-service subscription tier; the Sandbox is
  free and unmetered, so all development and testing carry no cost. Because charges
  map one-to-one onto payment operations that already carry a business meaning,
  Increase spend is highly attributable: every fee ties back to a specific
  Transaction, Account, Entity, and payment rail, which makes cost allocation and
  unit-economics analysis straightforward.
notes: >-
  Per-unit rates are set in the Increase commercial agreement and vary by volume
  and program; they are not a fixed public rate card. Reconcile actual rates from
  your agreement and Increase invoices. Sandbox usage is free. Use the List
  Transactions and List Events APIs (and Exports) to attribute spend to accounts,
  entities, and rails.
