meters:
- name: ach_transfers
  description: ACH credit and debit transfers originated over FedACH, billed per transfer.
  unit: transfers
  aggregation: sum
  dimensions:
  - account
  - entity
  - direction
- name: wire_transfers
  description: Domestic Fedwire transfers, billed per wire.
  unit: transfers
  aggregation: sum
  dimensions:
  - account
  - entity
- name: real_time_payments
  description: Instant RTP and FedNow transfers, billed per transfer.
  unit: transfers
  aggregation: sum
  dimensions:
  - account
  - entity
- name: check_transfers
  description: Printed and mailed (or third-party) checks, billed per check.
  unit: checks
  aggregation: sum
  dimensions:
  - account
  - entity
- name: card_transactions
  description: Card authorizations and settlements, with interchange terms per the agreement.
  unit: transactions
  aggregation: sum
  dimensions:
  - account
  - card
- name: account_program_fees
  description: Account, program, and related service fees per the agreement.
  unit: usd
  aggregation: sum
  dimensions:
  - account
  - program
principles:
- name: Visibility
  description: Attribute every fee to a specific Transaction, Account, Entity, and payment rail using the List Transactions, List Events, and Exports APIs.
- name: Allocation
  description: Map Accounts, Account Numbers, and Bookkeeping Accounts to teams, customers, or cost centers so per-item fees roll up to the right owner.
- name: Optimization
  description: Route payments to the cheapest rail that meets the need (ACH vs wire vs RTP), batch where possible, and use the free Sandbox for all testing.
- name: Accountability
  description: Reconcile Increase invoices against your own Transaction ledger monthly, and review volume tiers with Increase as usage grows.
